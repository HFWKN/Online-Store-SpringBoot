server:
  port: 10040

spring:
  profiles:
    active: local
  application:
    name: store-order
  cloud:
    nacos:
      server-addr: 192.168.100.128:8848
      discovery:
        namespace: dev
        group: DEFAULT_GROUP
      config:
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: shared-mysql.yaml
            refresh: false
          - data-id: shared-redis.yaml
            refresh: true
          - data-id: shared-rabbitmq.yaml
            refresh: false
          - data-id: shared-mybatis.yaml
            refresh: false
          - data-id: shared-feign.yaml
            refresh: false
          - data-id: shared-common.yaml
            refresh: false
          - data-id: shared-log.yaml
            refresh: false

logging:
  level:
    com.liubingqi: debug
