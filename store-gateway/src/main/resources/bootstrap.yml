server:
  port: 10010

spring:
  profiles:
    active: local
  application:
    name: store-gateway
  cloud:
    nacos:
      server-addr: 192.168.100.128:8848
      discovery:
        namespace: 1678c303-78be-43b0-841f-6122c97ac5e1
        group: DEFAULT_GROUP
      config:
        namespace: 1678c303-78be-43b0-841f-6122c97ac5e1
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: shared-redis.yaml
            refresh: true
          - data-id: shared-common.yaml
            refresh: false
          - data-id: shared-log.yaml
            refresh: false
          - data-id: store-gateway.yaml  # 你在Nacos中的网关配置文件名
            refresh: true
